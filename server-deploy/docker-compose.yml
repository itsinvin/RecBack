services:
  recback-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/itsinvin/recback-server:latest
    container_name: recback
    restart: unless-stopped
    ports:
      - "9999:9999"   # NameServer
      - "2018:2018"   # API Server
      - "20182:20182" # Image Server
      - "20161:20161" # Notification Server
    volumes:
      - ./data:/app/data
    environment:
      - EXTERNAL_IP=192.168.1.100  # CHANGE THIS to your NAS IP
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M